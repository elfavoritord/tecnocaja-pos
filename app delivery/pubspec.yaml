name: tecno_delivery
description: Tecno Caja Delivery - Aplicación para repartidores
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.5

  # Estado
  flutter_riverpod: ^2.6.1

  # Navegación
  go_router: ^14.6.2

  # Ubicación GPS
  geolocator: ^13.0.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utilidades
  intl: ^0.19.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icons/icon.png"
  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#1565C0"
    theme_color: "#1565C0"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
